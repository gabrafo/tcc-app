services:
  backend:
    build:
      context: ./back/projeto-gestao-tccs
      network: host
    network_mode: host
    environment:
      LOAD_INITIAL_DATA: "1"
      BACKEND_PORT: "${BACKEND_PORT:-8001}"
    volumes:
      - sqlite_data:/data
      - backend_media:/app/media

  frontend:
    build:
      context: ./front
      network: host
    network_mode: host
    depends_on:
      - backend
    environment:
      API_HOST: "${API_HOST:-}"
      BACKEND_PORT: "${BACKEND_PORT:-8001}"
      BROWSER: "none"
      EXPO_NO_TELEMETRY: "1"
      EXPO_OFFLINE: "${EXPO_OFFLINE:-1}"
      EXPO_HOST_IP: "${EXPO_HOST_IP:-}"
      EXPO_PORT: "${FRONTEND_PORT:-8082}"
      EXPO_TUNNEL: "${EXPO_TUNNEL:-0}"
      FRONTEND_COMMAND: "${FRONTEND_COMMAND:-}"
      FRONTEND_PORT: "${FRONTEND_PORT:-8082}"
    command: sh ./docker-start.sh
    stdin_open: true
    tty: true

volumes:
  sqlite_data:
  backend_media:
